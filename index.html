<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CabralDev - Official Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }


 <style>
.btn-cabral {
    background: #222;
    color: #ff0000;
    padding: 10px 20px;
    border: 2px solid #ff0000;
    cursor: pointer;
    font-weight: bold;
}

.overlay {
    display: none; /* Escondido */
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.9);
    z-index: 999;
    justify-content: center;
    align-items: center;
}

.caixa-video {
    width: 80%;
    max-width: 700px;
    position: relative;
}

.fechar {
    position: absolute;
    top: -30px; right: 0;
    color: white; font-size: 30px; cursor: pointer;
}


function ligarRaiding() {
    const janela = document.getElementById('janelaVideo');
    const video = document.getElementById('meuVideo');
    
    janela.style.display = 'flex'; // Mostra a janela
    video.play(); // Dá o play sozinho
}

function desligarRaiding() {
    const janela = document.getElementById('janelaVideo');
    const video = document.getElementById('meuVideo');
    
    janela.style.display = 'none'; // Esconde
    video.pause(); // Pausa o som
    video.currentTime = 0; // Volta pro início
}














        
        body {
            /* Atualizado para .png conforme o seu arquivo */
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                        url('pilha_dinheiro.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        .container {
            background: rgba(20, 20, 20, 0.9);
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            border: 4px solid #ff0000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
            animation: neonPulse 3s infinite alternate;
        }





<button onclick="ligarRaiding()" class="btn-cabral">
    C̷a̷b̷r̷a̷l̷D̷e̷v̷💤 Raiding Servers
</button>

<div id="janelaVideo" class="overlay">
    <div class="caixa-video">
        <span class="fechar" onclick="desligarRaiding()">&times;</span>
        <video id="meuVideo" width="100%">
            <source src="Video_test.mp4" type="video/mp4">
            Seu navegador não suporta vídeo.
        </video>
    </div>
</div>


        @keyframes neonPulse {
            from { border-color: #ff0000; box-shadow: 0 0 20px #ff0000; }
            to { border-color: #8a2be2; box-shadow: 0 0 30px #8a2be2; }
        }

        h1 {
            font-size: 32px;
            margin-bottom: 5px;
            letter-spacing: 2px;
            color: #fff;
        }

        .owner-text {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            margin: 12px 0;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            font-size: 16px;
            text-transform: uppercase;
            text-align: center;
        }

        .btn-enter {
            background: #5865F2; /* Azul Discord */
        }

        .btn-copy {
            background: #111;
            border: 1px solid #333;
        }

        .btn:hover {
            transform: scale(1.03);
            filter: brightness(1.2);
        }

        .footer-tag {
            margin-top: 25px;
            color: #ff0000;
            font-weight: bold;
            font-size: 14px;
            text-shadow: 0 0 5px rgba(255,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>CabralDev<span>💤</span></h1>
        <p class="owner-text">The best bot and best server</p>

        <a href="https://discord.gg/CNB6YBhBe2" target="_blank" class="btn btn-enter">
            ENTER DISCORD SERVER
        </a>

        <button class="btn btn-copy" onclick="copyLink()">
            ADD BOT IN YOUR SERVER
        </button>

        <div class="footer-tag">MADE BY CABRALDEV</div>
    </div>

    <script>
        function copyLink() {
            const link = "https://discord.com/oauth2/authorize?client_id=1479937612738330705&permissions=8&integration_type=0&scope=bot";
            navigator.clipboard.writeText(link).then(() => {
                alert("ADDING");
            });
        }
    </script>

</body>
</html>
