<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CabralDev - Official Page</title>
    <style>
        /* CONFIGURAÇÕES GERAIS */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('pilha_dinheiro.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* CONTAINER PRINCIPAL */
        .container {
            background: rgba(20, 20, 20, 0.9);
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            border: 4px solid #ff0000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
            animation: neonPulse 3s infinite alternate;
        }

        @keyframes neonPulse {
            from { border-color: #ff0000; box-shadow: 0 0 20px #ff0000; }
            to { border-color: #8a2be2; box-shadow: 0 0 30px #8a2be2; }
        }

        h1 {
            font-size: 32px;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .owner-text {
            font-size: 18px;
            margin-bottom: 25px;
            opacity: 0.8;
        }

        /* ESTILO DOS BOTÕES */
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            font-size: 14px;
            text-transform: uppercase;
            text-align: center;
        }

        .btn:hover {
            transform: scale(1.03);
            filter: brightness(1.2);
        }

        .btn-enter { background: #5865F2; } /* Discord */
        .btn-copy { background: #111; border: 1px solid #333; }
        
        /* BOTÃO DO VÍDEO (ESTILO CABRAL) */
        .btn-cabral {
            background: #222;
            color: #ff0000;
            border: 2px solid #ff0000;
            margin-top: 10px;
        }

        /* JANELA DO VÍDEO (OVERLAY) */
        .overlay {
            display: none; 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }

        .caixa-video {
            width: 90%;
            max-width: 700px;
            position: relative;
        }

        .fechar {
            position: absolute;
            top: -40px; right: 0;
            color: white; font-size: 40px; cursor: pointer;
        }

        .footer-tag {
            margin-top: 25px;
            color: #ff0000;
            font-weight: bold;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>CabralDev<span>💤</span></h1>
        <p class="owner-text">The best bot and best server</p>

        <a href="https://discord.gg/CNB6YBhBe2" target="_blank" class="btn btn-enter">
            ENTER DISCORD SERVER
        </a>

        <button class="btn btn-copy" onclick="copyLink()">
            ADD BOT IN YOUR SERVER
        </button>

        <button onclick="ligarRaiding()" class="btn btn-cabral">
            C̷a̷b̷r̷a̷l̷D̷e̷v̷💤 Raiding Servers
        </button>

        <div class="footer-tag">MADE BY CABRALDEV</div>
    </div>

    <div id="janelaVideo" class="overlay">
        <div class="caixa-video">
            <span class="fechar" onclick="desligarRaiding()">&times;</span>
            <video id="meuVideo" width="100%" controls>
                <source src="Video_test.mp4" type="video/mp4">
                Seu navegador não suporta vídeo.
            </video>
        </div>
    </div>

    <script>
        // Função para copiar link
        function copyLink() {
            const link = "https://discord.com/oauth2/authorize?client_id=1479937612738330705&permissions=8&scope=bot";
            navigator.clipboard.writeText(link).then(() => {
                alert("Copied!");
            });
        }

        // Funções do Vídeo
        function ligarRaiding() {
            const janela = document.getElementById('janelaVideo');
            const video = document.getElementById('meuVideo');
            janela.style.display = 'flex';
            video.play();
        }

        function desligarRaiding() {
            const janela = document.getElementById('janelaVideo');
            const video = document.getElementById('meuVideo');
            janela.style.display = 'none';
            video.pause();
            video.currentTime = 0;
        }
    </script>

</body>
</html>
